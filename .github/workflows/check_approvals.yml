name: SHAFFE Ads - Procesar aprobaciones

on:
  schedule:
    # Corre 3 veces el lunes: 11am, 2pm y 5pm ART (14, 17, 20 UTC)
    # Así captura clicks en cualquier momento del día después del collect de las 9am
    - cron: '0 14 * * 1'
    - cron: '0 17 * * 1'
    - cron: '0 20 * * 1'
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  check-approvals:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - run: pip install -r requirements.txt

      - run: python main.py check-approvals
        env:
          ML_CLIENT_ID: ${{ secrets.ML_CLIENT_ID }}
          ML_CLIENT_SECRET: ${{ secrets.ML_CLIENT_SECRET }}
          ML_SELLER_ID: ${{ secrets.ML_SELLER_ID }}
          ML_REDIRECT_URI: ${{ secrets.ML_REDIRECT_URI }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}

      - name: Persistir estado, tokens y historial
        run: |
          git config user.name "shaffe-ads-bot"
          git config user.email "bot@shaffe.local"
          git add memory/state.json memory/ml_tokens.json memory/changes_history.json
          git diff --cached --quiet || git commit -m "chore: estado tras procesar aprobaciones"
          git pull --rebase origin main
          git push
