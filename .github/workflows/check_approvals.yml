name: SHAFFE Ads - Chequeo de aprobaciones

on:
  schedule:
    - cron: '*/15 12-23 * * 2' # cada 15 min, martes 9:00-20:45 ART (12:00-23:45 UTC)
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  check-approvals:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - run: pip install -r requirements.txt

      - run: python main.py check-approvals
        env:
          ML_CLIENT_ID: ${{ secrets.ML_CLIENT_ID }}
          ML_CLIENT_SECRET: ${{ secrets.ML_CLIENT_SECRET }}
          ML_SELLER_ID: ${{ secrets.ML_SELLER_ID }}
          ML_REDIRECT_URI: ${{ secrets.ML_REDIRECT_URI }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}

      - name: Persistir estado, tokens ML y logs
        run: |
          git config user.name "shaffe-ads-bot"
          git config user.email "bot@shaffe.local"
          git add memory/state.json memory/ml_tokens.json logs/
          git diff --cached --quiet || git commit -m "chore: estado tras chequeo de aprobaciones"
          git push
