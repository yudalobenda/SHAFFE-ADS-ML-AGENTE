name: SHAFFE Ads - Research mensual tendencias

on:
  schedule:
    - cron: '0 12 1 * *' # primer día del mes, 9am ART (12:00 UTC)
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  research:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - run: pip install -r requirements.txt

      - run: python main.py research
        env:
          ML_CLIENT_ID: ${{ secrets.ML_CLIENT_ID }}
          ML_CLIENT_SECRET: ${{ secrets.ML_CLIENT_SECRET }}
          ML_SELLER_ID: ${{ secrets.ML_SELLER_ID }}
          ML_REDIRECT_URI: ${{ secrets.ML_REDIRECT_URI }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}

      - name: Persistir tokens ML
        run: |
          git config user.name "shaffe-ads-bot"
          git config user.email "bot@shaffe.local"
          git add memory/ml_tokens.json
          git diff --cached --quiet || git commit -m "chore: tokens tras research mensual"
          git push
